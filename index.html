```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Paint Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading">
        リズムデータ読み込み中...
    </div>

    <div id="game-container">

        <header>

            <h1>Rhythm Paint Game</h1>

            <div id="difficulty-container">

                <label for="difficulty">
                    Difficulty
                </label>

                <select id="difficulty">

                    <option value="easy">
                        EASY
                    </option>

                    <option value="normal">
                        NORMAL
                    </option>

                    <option value="hard">
                        HARD
                    </option>

                    <option value="expert">
                        EXPERT
                    </option>

                    <option value="mythic">
                        MYTHIC
                    </option>

                </select>

            </div>

            <div id="stats">

                <div>
                    Score:
                    <span id="score">0</span>
                </div>

                <div>
                    Combo:
                    <span id="combo">0</span>
                </div>

                <div>
                    Best:
                    <span id="best-combo">0</span>
                </div>

            </div>

            <div id="timer"></div>

            <div id="checkpoint-info"></div>

        </header>

        <main>

            <div id="board-wrapper">

                <div id="board"></div>

            </div>

            <div id="player-indicator">
                ▲
            </div>

        </main>

        <footer>

            <div id="controls">

                <p>
                    → : 1マス進む
                </p>

                <p>
                    SPACE : マスを塗る
                </p>

                <p>
                    赤マスでSPACEを押すとゲームオーバー
                </p>

            </div>

            <div id="message"></div>

            <button
                id="restart-button"
                hidden
            >
                Restart
            </button>

        </footer>

    </div>

    <script src="script.js"></script>

</body>
</html>
```
